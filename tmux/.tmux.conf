# Prefix
set-option -g prefix C-a
bind C-a send-prefix

# Terminal
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "xterm-256color"

# General
set -g base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g history-limit 1000000
set -g mouse on
set -g aggressive-resize on
set -sg escape-time 0
setw -g mode-keys vi

# Splits (preserve path)
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Prefix bindings
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."
bind e setw synchronize-panes
bind C-v split-window 'tmux capture-pane -t:.- -Jp -S- | nvim -'
bind j switch-client -l
bind k last-window
bind -r h swap-window -d -t -1
bind -r l swap-window -d -t +1
bind m command-prompt -p "Pane name:" "select-pane -T '%%'"
bind-key -r -T prefix S-Up resize-pane -U
bind-key -r -T prefix S-Down resize-pane -D
bind-key -r -T prefix S-Left resize-pane -L
bind-key -r -T prefix S-Right resize-pane -R

# Prefix-less bindings
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind-key -n M-j select-pane -t :.+
bind-key -n M-k select-pane -t :.-
bind-key -n C-g new-window
bind-key -n C-u copy-mode
bind-key -n 'C-]' switch-client -n
bind-key -n 'M-[' copy-mode
bind-key -n 'M-:' command-prompt

# Copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-selection
bind-key -T copy-mode-vi H send-keys -X -N 7 cursor-up
bind-key -T copy-mode-vi L send-keys -X -N 7 cursor-down
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi WheelUpPane send-keys -X clear-selection \; send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X clear-selection \; send-keys -X -N 5 scroll-down

# MacOS keys
bind-key -n Home send Escape "[1~"
bind-key -n End send Escape "[4~"
bind-key -n PPage send Escape "[5~"
bind-key -n NPage send Escape "[6~"

# Synchronized panes indicator
set-option -gw window-status-current-format '#{?pane_synchronized,#[fg=red]@@@#[default],}#I:#W#F#{?pane_synchronized,#[fg=red]@@@#[default],}'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_date_time_text "%d/%m %H:%M"
set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_status_modules_right "session date_time"
set-environment -g LC_ALL en_US.UTF-8
set-environment -g LC_TIME en_US.UTF-8

# TPM auto-install and initialize
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

# Post-plugin overrides (catppuccin/tmux-yank override these)
unbind -T copy-mode-vi MouseDragEnd1Pane
bind , set-option -w automatic-rename off \; command-prompt -I "#W" "rename-window '%%'"

# Pane borders (after plugins to override catppuccin)
set -g pane-border-lines double
set -g pane-border-indicators arrows
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#fab387,bold'
set -g pane-border-status top
set -g pane-border-format ' #[bold]#{?pane_active,#[fg=#fab387]●,#[fg=#444444]○}#[default] #P: #{?#{==:#{pane_title},#{host}},#{b:pane_current_path},#{pane_title}} '
set -g mode-style "fg=#cdd6f4,bg=#585b70"
