macos_option_as_alt true
copy_on_select yes
confirm_os_window_close 0
font_family JetBrainsMono Nerd Font Mono
clipboard_control write-clipboard write-primary read-clipboard read-primary

# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME

# Hints: ctrl+shift+p = paste, ctrl+shift+l = copy to clipboard
# letters (w)
map ctrl+shift+p>w kitten hints --program "-" --type regex --regex "[a-zA-Z]+"
map ctrl+shift+l>w kitten hints --program "@" --type regex --regex "[a-zA-Z]+"
# entire line (l)
map ctrl+shift+p>l kitten hints --program "-" --type regex --regex ".*"
map ctrl+shift+l>l kitten hints --program "@" --type regex --regex ".*"
# absolute path (a)
map ctrl+shift+p>a kitten hints --program "-" --type regex --regex '(?:^|\s|:|`|'\''|")(~?/[^\s:"`'\'']+)'
map ctrl+shift+l>a kitten hints --program "@" --type regex --regex '(?:^|\s|:|`|'\''|")(~?/[^\s:"`'\'']+)'
# path with line number (c)
map ctrl+shift+p>c kitten hints --program "-" --type regex --regex '(?:^|\s|:|`|"|'\''|[│║])(~?/[^\s:"`'\'']+:[0-9]+)'
map ctrl+shift+l>c kitten hints --program "@" --type regex --regex '(?:^|\s|:|`|"|'\''|[│║])(~?/[^\s:"`'\'']+:[0-9]+)'
# line suffix (x)
map ctrl+shift+p>x kitten hints --program "-" --type regex --regex "\\b\\S.*"
map ctrl+shift+l>x kitten hints --program "@" --type regex --regex "\\b\\S.*"
# snake case (s)
map ctrl+shift+p>s kitten hints --program "-" --type regex --regex "[a-zA-Z_]+"
map ctrl+shift+l>s kitten hints --program "@" --type regex --regex "[a-zA-Z_]+"
# vim word (v)
map ctrl+shift+p>v kitten hints --program "-" --type regex --regex "[a-zA-Z0-9_]+"
map ctrl+shift+l>v kitten hints --program "@" --type regex --regex "[a-zA-Z0-9_]+"
# numbers (n)
map ctrl+shift+p>n kitten hints --program "-" --type regex --regex "[0-9]+"
map ctrl+shift+l>n kitten hints --program "@" --type regex --regex "[0-9]+"
# directory name (d)
map ctrl+shift+p>d kitten hints --program "-" --type regex --regex '(?<=[/])([^/\s"'\''`(){}\[\]<>:;,|]+)(?=[/\s"'\''`(){}\[\]<>:;,|]|$)'
map ctrl+shift+l>d kitten hints --program "@" --type regex --regex '(?<=[/])([^/\s"'\''`(){}\[\]<>:;,|]+)(?=[/\s"'\''`(){}\[\]<>:;,|]|$)'
# big word (z)
map ctrl+shift+p>z kitten hints --program "-" --type regex --regex '[|│║]?(\S+)'
map ctrl+shift+l>z kitten hints --program "@" --type regex --regex '[|│║]?(\S+)'

map ctrl+j send_key down
map ctrl+k send_key up

map ctrl+shift+u kitten hints --customize-processing ~/.config/kitty/hints_auto_open_single_url.py
