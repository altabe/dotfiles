macos_option_as_alt true
copy_on_select yes
confirm_os_window_close 0
font_family JetBrainsMono Nerd Font Mono
clipboard_control write-clipboard write-primary read-clipboard read-primary

# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME

# Hints: ctrl+shift+p = paste, ctrl+shift+l = copy to clipboard
# All regex hints use dual_hints.py to show a hint at both start and end of each match
# letters (w)
map ctrl+shift+p>w kitten hints --program "-" --type regex --regex "[a-zA-Z]+" --customize-processing dual_hints.py
map ctrl+shift+l>w kitten hints --program "@" --type regex --regex "[a-zA-Z]+" --customize-processing dual_hints.py
# entire line (l)
map ctrl+shift+p>l kitten hints --program "-" --type regex --regex "\\S.*" --customize-processing dual_hints.py
map ctrl+shift+l>l kitten hints --program "@" --type regex --regex "\\S.*" --customize-processing dual_hints.py
# absolute path (a)
map ctrl+shift+p>a kitten hints --program "-" --type regex --regex '(?:^|\s|:|`|'\''|"|\()(~?/[^\s:"`()'\'']+)' --customize-processing dual_hints.py
map ctrl+shift+l>a kitten hints --program "@" --type regex --regex '(?:^|\s|:|`|'\''|"|\()(~?/[^\s:"`()'\'']+)' --customize-processing dual_hints.py
# path with line number (c)
map ctrl+shift+p>c kitten hints --program "-" --type regex --regex '(?:^|\s|:|`|"|'\''|[тФВтХС]|\()(~?/[^\s:"`()'\'']+:[0-9]+)' --customize-processing dual_hints.py
map ctrl+shift+l>c kitten hints --program "@" --type regex --regex '(?:^|\s|:|`|"|'\''|[тФВтХС]|\()(~?/[^\s:"`()'\'']+:[0-9]+)' --customize-processing dual_hints.py
# line suffix (x)
map ctrl+shift+p>x kitten hints --program "-" --type regex --regex "\\b\\S.*" --customize-processing dual_hints.py
map ctrl+shift+l>x kitten hints --program "@" --type regex --regex "\\b\\S.*" --customize-processing dual_hints.py
# snake case (s)
map ctrl+shift+p>s kitten hints --program "-" --type regex --regex "[a-zA-Z_]+" --customize-processing dual_hints.py
map ctrl+shift+l>s kitten hints --program "@" --type regex --regex "[a-zA-Z_]+" --customize-processing dual_hints.py
# vim word (v)
map ctrl+shift+p>v kitten hints --program "-" --type regex --regex "[a-zA-Z0-9_]+" --customize-processing dual_hints.py
map ctrl+shift+l>v kitten hints --program "@" --type regex --regex "[a-zA-Z0-9_]+" --customize-processing dual_hints.py
# numbers (n)
map ctrl+shift+p>n kitten hints --program "-" --type regex --regex "[0-9]+" --customize-processing dual_hints.py
map ctrl+shift+l>n kitten hints --program "@" --type regex --regex "[0-9]+" --customize-processing dual_hints.py
# directory name (d)
map ctrl+shift+p>d kitten hints --program "-" --type regex --regex '(?<=[/])([^/\s"'\''`(){}\[\]<>:;,|]+)(?=[/\s"'\''`(){}\[\]<>:;,|]|$)' --customize-processing dual_hints.py
map ctrl+shift+l>d kitten hints --program "@" --type regex --regex '(?<=[/])([^/\s"'\''`(){}\[\]<>:;,|]+)(?=[/\s"'\''`(){}\[\]<>:;,|]|$)' --customize-processing dual_hints.py
# big word (z)
map ctrl+shift+p>z kitten hints --program "-" --type regex --regex '[|тФВтХС]?(\S+)' --customize-processing dual_hints.py
map ctrl+shift+l>z kitten hints --program "@" --type regex --regex '[|тФВтХС]?(\S+)' --customize-processing dual_hints.py

map ctrl+j send_key down
map ctrl+k send_key up

map ctrl+shift+u kitten hints --customize-processing ~/.config/kitty/hints_auto_open_single_url.py
